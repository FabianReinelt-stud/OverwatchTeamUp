name: SonarQube Scan

on:
  push:
  pull_request:

jobs:
  sonarqube:
    name: SonarQube Scan
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: overwatch
          POSTGRES_USER: dbuser
          POSTGRES_PASSWORD: secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dbuser -d overwatch"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      POSTGRES_DB: overwatch
      POSTGRES_USER: dbuser
      POSTGRES_PASSWORD: secret
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend dependencies
        run: python -m pip install -r backend/requirements-dev.txt

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint backend
        run: ruff check backend/app

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Check Django migrations
        working-directory: backend/app
        run: python manage.py makemigrations --check --dry-run

      - name: Apply Django migrations
        working-directory: backend/app
        run: python manage.py migrate --noinput

      - name: Check backend architecture
        working-directory: backend/app
        run: python -m unittest discover -s architecture_tests -v

      - name: Run Django tests with coverage
        run: |
          coverage run --rcfile=backend/app/.coveragerc backend/app/manage.py test heroes
          coverage xml --rcfile=backend/app/.coveragerc -o backend/app/coverage.xml
          coverage report --rcfile=backend/app/.coveragerc

      - name: Run frontend tests with coverage
        working-directory: frontend
        run: npm test

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Seed e2e data
        working-directory: backend/app
        run: python manage.py loaddata e2e_heroes

      - name: Start backend for e2e tests
        working-directory: backend/app
        run: |
          python manage.py runserver 0.0.0.0:8000 > backend-server.log 2>&1 &
          for i in {1..30}; do
            if curl --fail --silent http://localhost:8000/api/heroes/ > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          cat backend-server.log
          exit 1

      - name: Start frontend for e2e tests
        working-directory: frontend
        env:
          VITE_API_PROXY_TARGET: http://localhost:8000
        run: |
          npm run dev -- --host 0.0.0.0 > frontend-server.log 2>&1 &
          for i in {1..30}; do
            if curl --fail --silent http://localhost:5173/api/heroes/ > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          cat frontend-server.log
          exit 1

      - name: Run Playwright e2e tests
        working-directory: frontend
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:5173
        run: npm run test:e2e

      - name: Print e2e server logs on failure
        if: failure()
        run: |
          cat backend/app/backend-server.log || true
          cat frontend/frontend-server.log || true

      - name: Run SonarQube scan
        uses: SonarSource/sonarqube-scan-action@fd88b7d7ccbaefd23d8f36f73b59db7a3d246602 # v6.0.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
