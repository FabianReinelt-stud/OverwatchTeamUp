name: SonarQube Scan

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  sonarqube:
    name: SonarQube Scan
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: overwatch
          POSTGRES_USER: dbuser
          POSTGRES_PASSWORD: secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dbuser -d overwatch"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      POSTGRES_DB: overwatch
      POSTGRES_USER: dbuser
      POSTGRES_PASSWORD: secret
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install backend dependencies
        run: python -m pip install -r backend/requirements-dev.txt

      - name: Check Django migrations
        working-directory: backend/app
        run: python manage.py makemigrations --check --dry-run

      - name: Apply Django migrations
        working-directory: backend/app
        run: python manage.py migrate --noinput

      - name: Run Django tests with coverage
        run: |
          coverage run --rcfile=backend/app/.coveragerc backend/app/manage.py test heroes
          coverage xml --rcfile=backend/app/.coveragerc -o backend/app/coverage.xml
          coverage report --rcfile=backend/app/.coveragerc

      - name: Run SonarQube scan
        uses: SonarSource/sonarqube-scan-action@fd88b7d7ccbaefd23d8f36f73b59db7a3d246602 # v6.0.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
